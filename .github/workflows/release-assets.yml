name: Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to upload assets to
        required: true
        type: string

permissions:
  contents: write

jobs:
  upload-assets:
    runs-on: ubuntu-latest

    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Generate checksums
        run: |
          sha256sum pi-clean.sh install.sh uninstall.sh > SHA256SUMS

      - name: Upload release assets
        run: |
          gh release upload "$TAG" \
            pi-clean.sh \
            install.sh \
            uninstall.sh \
            SHA256SUMS \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
